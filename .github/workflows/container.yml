name: Build Container

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nf-probeset
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summarize published image
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Published container"
            echo
            echo "- \\`${IMAGE_NAME}:${IMAGE_TAG}\\`"
            echo "- \\`${IMAGE_NAME}:latest\\`"
            echo
            echo "To create a Singularity/Apptainer image later, run:"
            echo
            echo "\\`apptainer pull docker://${IMAGE_NAME}:latest\\`"
          } >> "$GITHUB_STEP_SUMMARY"
